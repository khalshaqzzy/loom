name: Dependency Review

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - ".agent/**"
      - "docs/**"
      - "*.md"
      - "apps/mobile/**"
      - "firmware/**"
      - "packages/decision-tree/**"

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
