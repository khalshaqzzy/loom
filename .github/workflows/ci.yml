name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".agent/**"
      - "docs/**"
      - "*.md"
      - "apps/mobile/**"
      - "firmware/**"
      - "packages/decision-tree/**"
  pull_request:
    branches:
      - main
    paths-ignore:
      - ".agent/**"
      - "docs/**"
      - "*.md"
      - "apps/mobile/**"
      - "firmware/**"
      - "packages/decision-tree/**"

permissions:
  contents: read
  security-events: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run format check
        run: npm run format:check

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Run production build
        run: npm run build

      - name: Run Docker-free e2e
        run: npm run e2e

      - name: Validate hosted Compose config
        run: docker compose --env-file deploy/env/runtime.production.env.example -f deploy/compose/docker-compose.remote.yml config

      - name: Build hosted images
        run: docker compose --env-file deploy/env/runtime.production.env.example -f deploy/compose/docker-compose.remote.yml build

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.69.3
        with:
          scan-type: fs
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: 1
          scan-ref: .
