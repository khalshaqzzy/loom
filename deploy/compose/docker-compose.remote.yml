services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    environment:
      CADDY_EMAIL: ${CADDY_EMAIL}
      WEB_DOMAIN: ${WEB_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${SHARED_DIR}/caddy-data:/data
      - ${SHARED_DIR}/caddy-config:/config
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 10s

  mongo:
    image: mongo:7
    restart: unless-stopped
    entrypoint:
      [
        "/bin/bash",
        "-lc",
        'umask 077 && mkdir -p /data/configdb && printf ''%s'' "$$MONGO_REPLICA_KEY" > /data/configdb/mongo-keyfile && chown 999:999 /data/configdb/mongo-keyfile && exec docker-entrypoint.sh mongod --replSet rs0 --bind_ip_all --keyFile /data/configdb/mongo-keyfile'
      ]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
      MONGO_REPLICA_KEY: ${MONGO_REPLICA_KEY}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mongosh --quiet "mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@127.0.0.1:27017/admin" --eval "try { const status = rs.status(); if (status.ok !== 1) { quit(1); } } catch (error) { rs.initiate({_id: ''rs0'', members: [{ _id: 0, host: ''mongo:27017'' }]}); quit(1); } const hello = db.hello(); quit(hello.isWritablePrimary ? 0 : 1);"'
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    volumes:
      - ${SHARED_DIR}/mongo-data:/data/db

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DATABASE}?authSource=admin&replicaSet=rs0
      MONGO_DB_NAME: ${MONGO_DATABASE}
      CORS_ORIGIN: https://${WEB_DOMAIN}
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_BOOTSTRAP_USERNAME: ${ADMIN_BOOTSTRAP_USERNAME}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD}
      ADMIN_BOOTSTRAP_DISPLAY_NAME: ${ADMIN_BOOTSTRAP_DISPLAY_NAME}
      COOKIE_SECURE: "true"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/ready').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: https://${API_DOMAIN}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 20s
